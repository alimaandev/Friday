title: "Q&A"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask a question about using or contributing to Friday.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you already tried?
