name: Bug Report
description: File a bug report to help us improve Friday
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or error logs to help explain.
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 125, Firefox 130

  - type: input
    id: version
    attributes:
      label: Friday Version
      description: Git commit hash or tag
      placeholder: e.g. v2, 0ec886c

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
